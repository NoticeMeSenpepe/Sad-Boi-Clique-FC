name: SBCFC scrape

# Runs every 10 minutes. GitHub may delay scheduled runs under heavy load
# (this is normal); occasional gaps are acceptable for our purposes.
# Also runnable on demand via the Actions tab.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# Don't pile up runs if a previous one is still going.
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: scraper
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SBC_CLUB_ID:  '477926'
      SBC_PLATFORM: 'common-gen5'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scrape
        run: npm run scrape
